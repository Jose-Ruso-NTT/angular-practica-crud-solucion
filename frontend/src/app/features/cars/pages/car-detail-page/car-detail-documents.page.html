<section class="space-y-6">
  <article
    class="rounded-[1.75rem] border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-950/70"
  >
    <p class="text-xs font-semibold tracking-[0.24em] text-teal-700 uppercase dark:text-teal-300">
      Documentación
    </p>
    <h3 class="mt-2 text-2xl font-semibold tracking-tight text-slate-950 dark:text-white">
      {{ car()!.brand.name }} {{ car()!.model.name }}
    </h3>
    <p class="mt-3 text-sm text-slate-600 dark:text-slate-300">
      Esta subsección concentra la lectura, descarga, reemplazo y borrado del documento asociado al
      coche usando su propia ruta y su propio endpoint.
    </p>
  </article>

  <app-car-documents-section [carId]="car()!.id" />
</section>
