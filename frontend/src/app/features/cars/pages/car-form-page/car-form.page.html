<section class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-4">
    <div>
      <a
        routerLink="/cars"
        queryParamsHandling="preserve"
        class="text-sm font-medium text-teal-700 transition hover:text-teal-900 dark:text-teal-300 dark:hover:text-teal-200"
        >← Volver al listado</a
      >
      <h2 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950 dark:text-white">
        {{ title() }}
      </h2>
      <p class="mt-2 text-sm leading-6 text-slate-600 dark:text-slate-300">
        {{ subtitle() }}
      </p>
    </div>
  </div>

  @if (loading()) {
    <div
      class="rounded-[1.75rem] border border-slate-200 bg-white p-8 text-sm text-slate-600 shadow-sm dark:border-slate-800 dark:bg-slate-950/70 dark:text-slate-300"
    >
      Cargando formulario...
    </div>
  } @else {
    <app-car-form
      [mode]="mode()"
      [car]="car()"
      [pending]="pending()"
      [errorMessage]="errorMessage()"
      [errorCode]="errorCode()"
      [errorLicensePlate]="errorLicensePlate()"
      [submitLabel]="submitLabel()"
      (submitCar)="save($event)"
      (cancelForm)="goBack()"
    />
  }
</section>
