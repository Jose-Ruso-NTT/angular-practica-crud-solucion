<section class="space-y-6">
  <div class="flex flex-wrap items-start justify-between gap-4">
    <div>
      <a
        routerLink="/cars"
        queryParamsHandling="preserve"
        class="text-sm font-medium text-teal-700 transition hover:text-teal-900 dark:text-teal-300 dark:hover:text-teal-200"
        >← Volver al listado</a
      >
      <h2 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950 dark:text-white">
        @if (car()) {
          {{ car()!.brand.name }}
          {{ car()!.model.name }}
        } @else {
          Detalle del coche
        }
      </h2>
    </div>

    @if (car()) {
      <div class="flex flex-wrap gap-3">
        <a
          *appIfAdmin
          [routerLink]="['/cars', car()!.id, 'edit']"
          queryParamsHandling="preserve"
          appButton="secondary"
        >
          Editar
        </a>
        <button *appIfAdmin type="button" appButton="danger-secondary" (click)="deleteCar()">
          Eliminar
        </button>
      </div>
    }
  </div>

  @if (loading()) {
    <div
      class="rounded-[1.75rem] border border-slate-200 bg-white p-8 text-sm text-slate-600 shadow-sm dark:border-slate-800 dark:bg-slate-950/70 dark:text-slate-300"
    >
      Cargando detalle...
    </div>
  } @else if (errorMessage()) {
    <app-inline-message tone="error" [message]="errorMessage()!" />
  } @else if (car()) {
    <nav class="flex flex-wrap gap-2 border-b border-slate-200 pb-2 dark:border-slate-800">
      <a
        [routerLink]="['overview']"
        queryParamsHandling="preserve"
        routerLinkActive
        #overviewLink="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: true }"
        appButton="ghost"
        appButtonSize="sm"
        [class.btn-primary]="overviewLink.isActive"
        [class.btn-ghost]="!overviewLink.isActive"
      >
        Información general
      </a>
      <a
        [routerLink]="['documents']"
        queryParamsHandling="preserve"
        routerLinkActive
        #documentsLink="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: true }"
        appButton="ghost"
        appButtonSize="sm"
        [class.btn-primary]="documentsLink.isActive"
        [class.btn-ghost]="!documentsLink.isActive"
      >
        Documentos
      </a>
    </nav>

    <router-outlet />
  }
</section>
